<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Hanh lẻ Năm</title>
  <link rel="icon" type="image/png" href="HanhImages/Hanh.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #050505; color: #ffffff; margin: 0;
      overflow: hidden; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px;
    }

    #universe-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
    }

    .main-card {
      background: rgba(10, 10, 15, 0.7);
      backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      width: 100%; max-width: 420px;
      border-radius: 32px; padding: 30px;
      z-index: 10; max-height: 85vh; overflow-y: auto;
    }

    .nav-menu {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 20px;
      border-radius: 100px; display: flex; gap: 15px; z-index: 100;
    }

    .nav-item {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4); cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .nav-item.active { color: #c084fc; text-shadow: 0 0 8px rgba(192, 132, 252, 0.4); }

    .neon-luxury-title {
      font-size: 1.8rem; font-weight: 800;
      background: linear-gradient(90deg, #fff, #c084fc, #ff4ecd, #c084fc, #fff);
      background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: luxury-sweep 4s linear infinite;
    }
    @keyframes luxury-sweep { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

    .page-content { display: none; }
    .page-content.active { display: block; animation: fadeSlide 0.5s ease forwards; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .support-section { margin-bottom: 20px; }
    .support-header { font-size: 12px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .support-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .support-item {
      background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 10px; border-radius: 12px; font-size: 11px; text-align: center; color: rgba(255, 255, 255, 0.6);
    }

    .btn-gradient { background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%); border-radius: 16px; cursor: pointer; transition: 0.3s; }
    .btn-gradient:hover { opacity: 0.9; transform: translateY(-1px); }
    .input-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; }
  </style>
</head>
<body>

  <div id="universe-container"></div>

  <nav class="nav-menu">
    <div class="nav-item active" onclick="switchPage('home', this)">
      <i class="fa-solid fa-house"></i><span>Home</span>
    </div>
    <div class="nav-item" onclick="switchPage('support', this)">
      <i class="fa-solid fa-circle-question"></i><span>Hỗ trợ</span>
    </div>
    <a href="/discord" target="_blank" class="nav-item">
      <i class="fa-brands fa-discord text-[#5865F2]"></i><span>Discord</span>
    </a>
    <a href="https://guns.lol/_harblx" target="_blank" class="nav-item">
      <i class="fa-solid fa-bolt"></i><span>Bio</span>
    </a>
  </nav>

  <div class="main-card">
    <div id="page-home" class="page-content active">
      <div class="text-center mb-8">
        <div class="inline-block p-4"><img src="HanhImages/hanh.GIF" class="w-12 mx-auto"></div>
        <h1 class="neon-luxury-title">Hanh lẻ Năm</h1>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] mt-2 font-bold">Bypass Linkvertise, Delta, Lootlabs...</p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-2 block ml-1">Destination URL</label>
          <div class="input-box flex items-center px-4 py-3 relative">
            <i class="fa-solid fa-link text-slate-600 mr-3 text-xs"></i>
            <input type="text" id="urlInput" placeholder="Dán link tại đây..." class="bg-transparent border-none outline-none w-full text-white text-sm">
          </div>
        </div>

        <button id="bypassBtn" class="w-full btn-gradient py-4 font-black text-white text-[11px] tracking-widest flex items-center justify-center gap-2 group">
          <span>BẮT ĐẦU GIẢI MÃ</span>
          <i class="fa-solid fa-angles-right"></i>
        </button>

        <div id="loader" class="hidden text-center py-4">
          <div class="w-6 h-6 border-2 border-violet-500/20 border-t-violet-500 rounded-full animate-spin mx-auto"></div>
        </div>

        <div id="resultBox" class="hidden bg-white/5 border border-white/10 rounded-2xl p-4">
          <div id="resultLink" class="p-3 bg-black/40 rounded-xl text-violet-200 font-mono text-[10px] break-all text-center border border-white/5 mb-3">...</div>
          <div class="flex flex-col gap-2">
            <a id="openBtn" href="#" target="_blank" class="hidden w-full text-center py-3 btn-gradient text-white text-[10px] font-black uppercase">Truy cập</a>
            <button id="bigCopyBtn" class="hidden w-full text-center py-3 border border-white/10 text-white text-[10px] font-black uppercase">Sao chép</button>
          </div>
        </div>
        <div id="status-message" class="hidden text-center text-[10px] py-2 text-violet-400 font-bold uppercase"></div>
      </div>
    </div>

    <div id="page-support" class="page-content">
      <div class="text-center mb-6">
        <h2 class="text-lg font-black uppercase tracking-widest">Danh sách hỗ trợ</h2>
      </div>

      <div class="support-section">
        <div class="support-header"><i class="fa-solid fa-key text-violet-400"></i><span>Key System</span></div>
        <div class="support-grid">
          <div class="support-item">Platoboost</div><div class="support-item">Pandadevel</div>
          <div class="support-item">Trigon</div><div class="support-item">Violated</div>
          <div class="support-item">Hydrogen</div><div class="support-item">Codex</div>
        </div>
      </div>

      <div class="support-section">
        <div class="support-header"><i class="fa-solid fa-rectangle-ad text-violet-400"></i><span>Ad-Link</span></div>
        <div class="support-grid">
          <div class="support-item">Linkvertise</div><div class="support-item">Admaven</div>
          <div class="support-item">Workink</div><div class="support-item">Fly.inc</div>
          <div class="support-item">Lootlabs</div><div class="support-item">Lockrso</div>
        </div>
      </div>

      <button onclick="switchPage('home', document.querySelector('.nav-item'))" class="w-full py-3 border border-white/10 rounded-xl text-[10px] font-bold text-slate-400 uppercase tracking-widest">Quay lại</button>
    </div>

    <div class="mt-8 pt-6 border-t border-white/5 text-center">
      <p class="text-[8px] text-slate-700 uppercase tracking-[0.4em] font-bold mb-2">© HanhLeNam - 2026</p>
      <div class="flex items-center justify-center gap-2">
        <i class="fa-solid fa-eye text-[#8b5cf6] text-[10px]"></i>
        <span class="text-[9px] text-slate-500 font-bold uppercase">Lượt xem: <span id="view-count-display" class="text-[#c084fc]">--</span></span>
      </div>
    </div>
  </div>

  <script src="api/bypass.js"></script>
  <script type="module" src="api/view.js"></script>

</body>
</html>
