    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        :root { --primary: #8b5cf6; --secondary: #d946ef; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505; color: #ffffff; margin: 0;
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #universe-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }
        .star {
            position: absolute; background: white; border-radius: 50%; opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .nav-menu {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08); padding: 10px 25px;
            border-radius: 100px; display: flex; gap: 20px; z-index: 100;
        }
        .nav-item {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease; display: flex; align-items: center; gap: 6px; cursor: pointer;
        }
        .nav-item.active { color: #c084fc; text-shadow: 0 0 10px rgba(192, 132, 252, 0.5); }
        .neon-luxury-title {
            font-size: 2.25rem; font-weight: 800;
            background: linear-gradient(90deg, #fff, #c084fc, #ff4ecd, #c084fc, #fff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: luxury-sweep 4s linear infinite;
        }
        @keyframes luxury-sweep { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        .main-card {
            background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08); width: 95%; max-width: 500px;
            border-radius: 40px; padding: 40px; z-index: 10;
        }
        .page-content { display: none; animation: fadeSlide 0.5s ease forwards; }
        .page-content.active { display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-box { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-gradient { background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%); }
        .visitor-counter { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .visitor-counter i { color: #8b5cf6; font-size: 10px; }
        .visitor-counter span { font-size: 9px; color: rgba(255,255,255,0.35); font-weight: 700; text-transform: uppercase; }
        .count-num { color: #c084fc; }
        #clearBtn { opacity: 0; pointer-events: none; transition: 0.2s; }
        #clearBtn.visible { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

<div id="universe-container"></div>

<nav class="nav-menu">
    <div class="nav-item active" onclick="switchPage('home', this)">
        <i class="fa-solid fa-house"></i><span>Home</span>
    </div>
    <div class="nav-item" onclick="switchPage('support', this)">
        <i class="fa-solid fa-circle-question"></i><span>Hỗ trợ</span>
    </div>
    <a href="/discord" target="_blank" class="nav-item">
        <i class="fa-brands fa-discord text-[#5865F2]"></i>
            <span>Discord</span>
        </a>
        <a href="https://guns.lol/_harblx" target="_blank" class="nav-item">
            <i class="fa-solid fa-bolt"></i>
            <span>Link Bio</span>
        </a>
</nav>

<div class="main-card">
    <div id="page-home" class="page-content active">
        <div class="text-center mb-8">
            <div class="inline-block p-4"><img src="HanhImages/hanh.GIF" class="w-12 mx-auto"></div>
            <h1 class="neon-luxury-title">Hanh lẻ Năm</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.2em] mt-2 font-bold">Bypass Linkvertise, Delta, Lootlabs...</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="text-[9px] uppercase tracking-[0.3em] text-slate-500 font-black mb-2 block ml-1">Destination URL</label>
                <div class="input-box flex items-center px-5 py-4 rounded-2xl relative">
                    <i class="fa-solid fa-link text-slate-600 mr-4 text-xs"></i>
                    <input type="text" id="urlInput" placeholder="Dán link của bạn tại đây..." class="bg-transparent border-none outline-none w-full text-white text-sm">
                    <button id="clearBtn" class="absolute right-5 text-slate-600 hover:text-white"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>
            </div>

            <button id="bypassBtn" class="w-full btn-gradient py-4 rounded-2xl font-black text-white text-xs tracking-widest flex items-center justify-center gap-2 group">
                <span>BẮT ĐẦU GIẢI MÃ</span>
                <i class="fa-solid fa-angles-right group-hover:translate-x-1 transition-transform"></i>
            </button>

            <div id="status-message" class="hidden"></div>

            <div id="loader" class="hidden text-center py-4">
                <div class="w-8 h-8 border-2 border-violet-500/20 border-t-violet-500 rounded-full animate-spin mx-auto mb-2"></div>
                <p class="text-[9px] text-violet-400 font-black tracking-[0.3em] uppercase">Scanning...</p>
            </div>

            <div id="resultBox" class="hidden bg-violet-500/5 border border-violet-500/20 rounded-2xl p-5">
                <p class="text-[9px] font-black text-violet-400 text-center mb-3 uppercase">KẾT QUẢ</p>
                <div id="resultLink" class="p-3 bg-black/40 rounded-xl text-violet-200 font-mono text-[10px] break-all text-center border border-white/5 mb-4 min-h-[40px] flex items-center justify-center">...</div>
                <div id="actionArea">
                    <a id="openBtn" href="#" target="_blank" class="hidden w-full text-center py-3 btn-gradient text-white rounded-xl text-[10px] font-black tracking-widest mb-2">TRUY CẬP NGAY</a>
                    <button id="bigCopyBtn" onclick="copyToClipboard(document.getElementById('resultLink').innerText, this)" class="hidden w-full text-center py-3 border border-white/10 text-white rounded-xl text-[10px] font-black tracking-widest">SAO CHÉP</button>
                </div>
            </div>
        </div>
    </div>

    <div id="page-support" class="page-content">
        <div class="text-center mb-6">
            <h2 class="text-lg font-black uppercase tracking-widest">Danh sách hỗ trợ</h2>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-6">
            <div class="p-3 bg-white/5 rounded-xl text-[11px] text-center">Linkvertise</div>
            <div class="p-3 bg-white/5 rounded-xl text-[11px] text-center">Delta Executor</div>
            <div class="p-3 bg-white/5 rounded-xl text-[11px] text-center">Lootlabs</div>
            <div class="p-3 bg-white/5 rounded-xl text-[11px] text-center">Codex</div>
        </div>
        <button onclick="switchPage('home', document.querySelector('.nav-item'))" class="w-full py-3 border border-white/10 rounded-xl text-[10px] font-bold text-slate-400 uppercase">Quay lại</button>
    </div>

    <div class="mt-8 pt-6 border-t border-white/5 text-center">
        <p class="text-[8px] text-slate-700 uppercase tracking-[0.4em] font-bold mb-3">© HanhLeNam - 2026</p>
        <div class="visitor-counter">
            <i class="fa-solid fa-eye"></i>
            <span>Lượt xem: <span class="count-num" id="view-count-display">--</span></span>
        </div>
    </div>
</div>

<script src="api/bypass.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCkAy-W-cQdRcSAhaEwf2SknsB5K4vBMTw",
        authDomain: "harblx-e3e8e.firebaseapp.com",
        projectId: "harblx-e3e8e",
        storageBucket: "harblx-e3e8e.firebasestorage.app",
        messagingSenderId: "942699698919",
        appId: "1:942699698919:web:931426388fb82f9b082042",
        databaseURL: "https://harblx-e3e8e-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const viewRef = ref(db, 'total_views');

    runTransaction(viewRef, (current) => (current || 0) + 1);

 
    onValue(viewRef, (snapshot) => {
        const count = snapshot.val();
        const display = document.getElementById('view-count-display');
        if (display) display.innerText = count ? count.toLocaleString() : '0';
    });
</script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof createUniverse === 'function') createUniverse();
    });
</script>

</body>
